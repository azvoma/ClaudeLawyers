let dirPage=1, dirCity='', dirQ='', dirSort='rating', curSlug='', srchQ='', srchCity='', PS=18;

// ── Click handler (event delegation — zero onclick attrs anywhere) ──────────
document.addEventListener('click', e => {
  let el = e.target;
  for (let i=0; i<6; i++) {
    if (!el || el===document) break;
    const ds = el.dataset||{};
    if ('nav'     in ds) { e.preventDefault(); nav(ds.nav); return; }
    if ('city'    in ds) { e.preventDefault(); goCity(ds.city); return; }
    if ('slug'    in ds) { e.preventDefault(); openProfile(ds.slug); return; }
    if ('phone'   in ds) { e.preventDefault(); window.open(`tel:${ds.phone}`); return; }
    if ('url'     in ds) { e.preventDefault(); window.open(ds.url,'_blank','noopener'); return; }
    if ('sort'    in ds) { e.preventDefault(); dirSort=ds.sort; dirPage=1; renderDir(); return; }
    if ('dircity' in ds) { e.preventDefault(); dirCity=ds.dircity; dirPage=1; renderDir(); return; }
    if ('page'    in ds) { e.preventDefault(); dirPage=parseInt(ds.page); renderDir(); return; }
    if ('clrdir'  in ds) { e.preventDefault(); dirQ=''; dirCity=''; dirPage=1; renderDir(); return; }
    if ('clrsrch' in ds) { e.preventDefault(); srchQ=''; srchCity=''; renderSearch(); return; }
    if ('contact' in ds) { e.preventDefault(); alert('Thank you! Your message has been received. We will respond within 2-3 business days.'); return; }
    el = el.parentElement;
  }
});

// ── Navigation ─────────────────────────────────────────────────────────────
function nav(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`pg-${page}`).classList.add('active');
  window.scrollTo(0,0);
  updatePageMeta(page);
  const map = {home:renderHome,solicitors:renderDir,profile:()=>renderProfile(curSlug),search:renderSearch,about:renderAbout,contact:renderContact,privacy:renderPrivacy,terms:renderTerms};
  if (map[page]) map[page]();
}
function goCity(c)         { dirCity=c; dirPage=1; nav('solicitors'); }
function openProfile(slug) {
  curSlug = slug;
  const s = D.all_solicitors.find(x=>x.slug===slug);
  if (s) {
    const city = s.city || 'UK';
    updatePageMeta('profile', {
      title: `$\{s.name} | $\{city} Employment Solicitor$\{s.rating ? ' | '+s.rating+'\u2605' : ''}`,
      desc:  `$\{s.name} — employment solicitors in $\{city}. View verified ratings, contact details, opening hours and services. Free directory listing.`,
      canonical: `https://employmentsolicitorsnearme.co.uk/solicitors/$\{s.slug}`
    });
  }
  nav('profile');
}

const h = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const a = s => String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const set = (id,html) => document.getElementById(id).innerHTML = html;
const ico = (name,sz=16) => `<span style='display:inline-flex;align-items:center;width:${sz}px;height:${sz}px;flex-shrink:0'>${IC[name]}</span>`;

function starsHtml(r) {
  if (!r) return '';
  const n=Math.round(r);
  let s=`<div class='stars'>`;
  for(let i=0;i<5;i++) s+=`<svg viewBox='0 0 576 512' class='${i<n?"s-on":"s-off"}'><path d='M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.9 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z'/></svg>`;
  return s+`</div>`;
}

function avHtml(s,cls) {
  const init = s.name.replace(/[^A-Za-z ]/g,'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
  return `<div class='${cls}' data-logo='${a(s.logo||"")}' data-init='${a(init)}'>${h(init)}</div>`;
}
function loadAvatars() {
  document.querySelectorAll('[data-logo]').forEach(el => {
    const logo=el.getAttribute('data-logo'), init=el.getAttribute('data-init');
    if (!logo) return;
    const img=new Image();
    img.onload  = () => { el.innerHTML=''; img.style.cssText='width:100%;height:100%;object-fit:contain'; el.appendChild(img); };
    img.onerror = () => { el.textContent=init; };
    img.src=logo; img.alt=init;
  });
}

  const loc  = h((s.city||'')+(s.postal_code?', '+s.postal_code:''));
  const rat  = s.rating ? `<div class='rating-row'>${starsHtml(s.rating)}<span class='r-num'>${s.rating.toFixed(1)}</span>${s.reviews?`<span class='r-cnt'>(${s.reviews} reviews)</span>`:''}</div>` : '';

    </div>
  </button>`;
}

// ── DIRECTORY ──────────────────────────────────────────────────────────────
function renderDir() {
  let results = D.all_solicitors.filter(s=>
    (!dirCity||(s.city||'').toLowerCase()===dirCity.toLowerCase()) &&
    (!dirQ||s.name.toLowerCase().includes(dirQ.toLowerCase())||(s.subtypes||'').toLowerCase().includes(dirQ.toLowerCase())||(s.description||'').toLowerCase().includes(dirQ.toLowerCase()))
  );
  if(dirSort==='reviews') results=results.slice().sort((a,b)=>(b.reviews||0)-(a.reviews||0));
  else if(dirSort==='name') results=results.slice().sort((a,b)=>a.name.localeCompare(b.name));
  else results=results.slice().sort((a,b)=>(b.rating||0)-(a.rating||0));

  const total=results.length, pages=Math.ceil(total/PS);
  const paged=results.slice((dirPage-1)*PS,dirPage*PS);
  const s1=(dirPage-1)*PS+1, s2=Math.min(dirPage*PS,total);

  const cityOpts=`<button class='city-opt${!dirCity?' on':''}' data-dircity=''>All Cities <span>${D.total}</span></button>`
    +D.cities.map(c=>`<button class='city-opt${dirCity===c.city?' on':''}' data-dircity='${a(c.city)}'>${h(c.city)} <span>${c.count}</span></button>`).join('');

  let pg='';
  if(pages>1){
    pg=`<div class='pager'>`;
    if(dirPage>1) pg+=`<button class='pg-txt' data-page='${dirPage-1}'>&larr; Prev</button>`;
    const ps=Math.max(1,dirPage-2), pe=Math.min(pages,ps+4);
    for(let p=ps;p<=pe;p++) pg+=`<button class='pg-n${p===dirPage?' on':''}' data-page='${p}'>${p}</button>`;
    if(dirPage<pages) pg+=`<button class='pg-txt' data-page='${dirPage+1}'>Next &rarr;</button>`;

function updatePageMeta(page, extras) {
  const base = PAGE_META[page] || PAGE_META.home;
  const meta = Object.assign({}, base, extras || {});

  // Update <title>
  document.title = meta.title;

  // Update or create meta description
  let descTag = document.querySelector('meta[name="description"]');
  if (!descTag) { descTag = document.createElement('meta'); descTag.setAttribute('name','description'); document.head.appendChild(descTag); }
  descTag.setAttribute('content', meta.desc);

  // Update canonical
  let canonTag = document.querySelector('link[rel="canonical"]');
  if (!canonTag) { canonTag = document.createElement('link'); canonTag.setAttribute('rel','canonical'); document.head.appendChild(canonTag); }
  canonTag.setAttribute('href', meta.canonical);

  // Update OG tags
  const ogMap = {'og:title': meta.title, 'og:description': meta.desc, 'og:url': meta.canonical};
  Object.entries(ogMap).forEach(([prop, val]) => {
    let tag = document.querySelector(`meta[property="${prop}"]`);
    if (!tag) { tag = document.createElement('meta'); tag.setAttribute('property',prop); document.head.appendChild(tag); }
    tag.setAttribute('content', val);
  });

  // Update twitter tags
  const twMap = {'twitter:title': meta.title, 'twitter:description': meta.desc};
  Object.entries(twMap).forEach(([name, val]) => {
    let tag = document.querySelector(`meta[name="${name}"]`);
    if (!tag) { tag = document.createElement('meta'); tag.setAttribute('name',name); document.head.appendChild(tag); }
    tag.setAttribute('content', val);
  });
}

// ── Boot ───────────────────────────────────────────────────────────────────
renderHome();
</script>
